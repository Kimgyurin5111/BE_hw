<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <h1>글 작성</h1>
        <form action="{% url 'posts:create' %}" method="POST">
            {% csrf_token %}
            <p>
                제목 - <input type="text" name="title" placeholder="글 작성" />
            </p>
            <p>
                내용 -
                <textarea name="content" placeholder="내용입니다."></textarea>
            </p>
            <button type="submit">작성하기</button>
        </form>
    </body>
</html>
